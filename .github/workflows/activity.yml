name: Update Activity Feed

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Fetch GitHub activity
        run: |
          curl -s https://api.github.com/users/GABIs-Hub/events > events.json

      - name: Create activity content
        run: |
          echo "## 📅 Daily Activity" > activity.txt
          echo "" >> activity.txt

          grep '"type": "PushEvent"' -A 5 events.json | grep '"repo"' -A 2 | grep '"name"' | head -6 | sed 's/.*"name": "\(.*\)".*/- 🚀 \1/' >> activity.txt

      - name: Inject into README
        run: |
          awk '/<!--START_ACTIVITY-->/{print;system("cat activity.txt");next}/<!--END_ACTIVITY-->/{print;next}1' README.md > temp.md
          mv temp.md README.md

      - name: Commit changes
        run: |
          git config --global user.name "activity-bot"
          git config --global user.email "bot@github.com"
          git add README.md
          git commit -m "Update activity feed" || echo "No changes"
          git push
